<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <!-- Logo mark: rounded square with medical cross + circuit accents -->
  <rect width="56" height="56" x="4" y="4" rx="14" fill="#0A1628"/>
  <!-- Vertical bar of cross -->
  <rect x="23" y="11" width="18" height="42" rx="6" fill="url(#g1)"/>
  <!-- Horizontal bar of cross -->
  <rect x="11" y="23" width="42" height="18" rx="6" fill="url(#g1)"/>
  <!-- Circuit corner dots -->
  <circle cx="14" cy="14" r="2.5" fill="#E8C87A" opacity="0.5"/>
  <circle cx="50" cy="14" r="2.5" fill="#E8C87A" opacity="0.5"/>
  <circle cx="14" cy="50" r="2.5" fill="#E8C87A" opacity="0.5"/>
  <circle cx="50" cy="50" r="2.5" fill="#E8C87A" opacity="0.5"/>
  <!-- Small pulse line accent -->
  <path d="M11 32 L16 32 L20 22 L24 42 L28 28 L32 32 L53 32" stroke="#E8C87A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  <!-- Wordmark -->
  <text x="72" y="35" font-family="'Arial Black',Arial,sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5" fill="#0A1628">Medi<tspan fill="#C9A84C">Plex</tspan></text>
  <!-- Tagline -->
  <text x="73" y="50" font-family="Arial,sans-serif" font-size="8.5" font-weight="500" letter-spacing="2.5" fill="#6B7280">AI FOR SMART HEALTHCARE</text>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C87A"/>
    </linearGradient>
  </defs>
</svg>
